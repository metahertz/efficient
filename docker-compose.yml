services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Isolated MongoDB for the test harness — keeps test index churn off the
  # daemon's production mongot so wedged/rebuilding indexes can't cross-contaminate.
  mongodb-test:
    image: mongodb/mongodb-atlas-local:latest
    ports:
      - "27018:27017"
    volumes:
      - mongodb_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - .:/workspace
      - hf_cache:/root/.cache/huggingface
    working_dir: /workspace
    command: sleep infinity
    environment:
      - FINOPS_MONGODB_URI=mongodb://mongodb:27017
      - FINOPS_DB_NAME=finops
      - FINOPS_TEST_MONGODB_URI=mongodb://mongodb-test:27017
      - HF_HOME=/root/.cache/huggingface
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-test:
        condition: service_healthy

  daemon:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    ports:
      - "127.0.0.1:7432:7432"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - FINOPS_MONGODB_URI=mongodb://mongodb:27017
      - FINOPS_DB_NAME=finops
      - HF_HOME=/root/.cache/huggingface
      - FINOPS_API_TOKEN=${FINOPS_API_TOKEN:-}
    depends_on:
      mongodb:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: python -m finops.mcp.server
    environment:
      - FINOPS_DAEMON_URL=http://daemon:7432
      - FINOPS_API_TOKEN=${FINOPS_API_TOKEN:-}
    volumes:
      - .:/workspace
    depends_on:
      - daemon

volumes:
  mongodb_data:
  mongodb_test_data:
  hf_cache:
